<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القوانين | المستشار اليمني القانوني</title>
<meta name="description" content="المستشار اليمني القانوني — مساعد قانوني ذكي متخصص في القوانين والتشريعات اليمنية. ابحث في أكثر من 12,000 مادة قانونية.">
<meta name="theme-color" content="#0a1628">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a8a'/><text x='50' y='65' text-anchor='middle' font-size='45' fill='%23d4a843' font-weight='bold'>م.ق</text></svg>">
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<script src="app.js"></script>
</head>
<body>
<nav class="navbar"><div class="navbar-inner"><a href="index.html" class="brand"><div class="brand-icon">م.ق</div><div class="brand-text"><div class="brand-name">المستشار اليمني القانوني</div></div></a><a href="advisor.html" class="back-btn" style="margin-left:8px">⚖️ المستشار</a><a href="index.html" class="back-btn">← الرئيسية</a></div></nav>

<div class="container">
  <div class="page-header"><h1>القوانين اليمنية</h1><p>بحث ذكي داخل القوانين والدعاوى مع ترتيب حسب الصلة</p></div>
  <div class="toolbar">
    <div class="search-row">
      <div class="search-field"><span class="field-icon icon icon-sm"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span><input type="text" id="searchInput" placeholder="ابحث... مثال: نفقة، فسخ، مادة 43"></div>
      <a href="index.html" class="btn btn-outline">🏠 الرئيسية</a>
    </div>
    <div class="summary" id="resultSummary">جاري التحميل...</div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="grid" id="grid"><div class="empty-state">جاري التحميل...</div></div>
</div>

<footer class="footer-simple">&copy; 2026 المستشار اليمني القانوني — المستشار اليمني القانوني</footer>
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script src="search-engine.js"></script>
<script>
var catalog=null, fullDB=null, currentSection='all', lawSearchIndex=[];
var sectionTabs=[{k:'all',n:'الكل'},{k:'personal-status',n:'الأحوال الشخصية'},{k:'civil',n:'المدني'},{k:'commercial',n:'التجاري'},{k:'criminal',n:'الجنائي'},{k:'labor',n:'العمل'},{k:'litigation-procedures',n:'التقاضي'},{k:'yemeni-laws',n:'القوانين'}];

async function loadCatalog(){
  catalog=await App.loadCatalog();
  lawSearchIndex=LawbookSearch.buildIndex(catalog).filter(function(i){return i.type==='law'||i.type==='article';});
  var p=new URLSearchParams(location.search);
  if(p.get('section')) currentSection=p.get('section');
  renderTabs(); renderLaws();
}
async function ensureFullDB(){ if(fullDB) return fullDB; fullDB=await App.loadDatabase(); return fullDB; }
function updateUrl(){ var u=new URL(location.href); if(currentSection&&currentSection!=='all') u.searchParams.set('section',currentSection); else u.searchParams.delete('section'); history.replaceState(null,'',u.toString()); }
function renderTabs(){ var h=''; for(var i=0;i<sectionTabs.length;i++) h+='<button class="tab'+(sectionTabs[i].k===currentSection?' active':'')+'" onclick="setSection(\''+sectionTabs[i].k+'\')">'+sectionTabs[i].n+'</button>'; document.getElementById('tabs').innerHTML=h; }
function setSection(s){ currentSection=s; updateUrl(); renderTabs(); renderLaws(); }

function renderLaws(){
  if(!catalog) return;
  var q=document.getElementById('searchInput').value.trim(), laws;
  if(q){ laws=LawbookSearch.search(lawSearchIndex,q,{types:['law','article'],section:currentSection==='all'?'':currentSection,limit:500}); }
  else{ laws=LawbookSearch.flattenLaws(catalog,currentSection).sort(function(a,b){return(b.articleCount||0)-(a.articleCount||0)||a.title.localeCompare(b.title,'ar');}).map(function(i){return{item:i,url:i.url,title:i.title,description:i.description,sectionLabel:i.sectionLabel,articleCount:i.articleCount,snippet:i.description};}); }
  document.getElementById('resultSummary').textContent=q?'تم العثور على '+Number(laws.length).toLocaleString('en-US')+' نتيجة':'يعرض '+Number(laws.length).toLocaleString('en-US')+' عنصرًا قانونيًا';
  var h='';
  for(var i=0;i<laws.length;i++){
    var x=laws[i], l=x.item||x;
    h+='<div class="law-card"><div class="law-card-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"/></svg></div>';
    h+='<div class="law-card-body"><div class="tags"><span class="tag">'+LawbookSearch.escapeHtml(l.sectionLabel||x.sectionLabel||'')+'</span>';
    if(l.articleCount||x.articleCount) h+='<span class="tag">'+Number(l.articleCount||x.articleCount).toLocaleString('en-US')+' مادة</span>';
    h+='</div><h4>'+LawbookSearch.escapeHtml(l.title)+'</h4>';
    h+='<p>'+LawbookSearch.highlightText(x.snippet||l.description||'',q)+'</p></div>';
    h+='<div class="law-card-actions"><button class="btn btn-gold" onclick="downloadPDF(\''+l.section+'\',\''+l.slug+'\')">📄 PDF</button>';
    h+='<a class="btn btn-blue" href="'+l.url+'">👁️ عرض</a></div></div>';
  }
  document.getElementById('grid').innerHTML=h||'<div class="empty-state">لا توجد نتائج.</div>';
}
document.getElementById('searchInput').addEventListener('input',renderLaws);
function findLaw(s,slug){ var a=(((fullDB||{}).laws||{})[s]||[]); for(var i=0;i<a.length;i++) if(a[i].slug===slug) return a[i]; return null; }
async function downloadPDF(s,slug){
  try{ await ensureFullDB(); var l=findLaw(s,slug);
  if(!l){window.location.href='viewer.html?type=law&section='+encodeURIComponent(s)+'+'&slug='+encodeURIComponent(slug);return;}
  var t=l.title||'قانون',c='';
  if(l.articles&&l.articles.length){for(var i=0;i<l.articles.length;i++){var a=l.articles[i];c+='<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #e5e8f0"><strong style="color:#0b225a">مادة ('+(a.number||'')+')</strong> '+(a.text||'')+'</div>';}}
  else if(l.content){for(var j=0;j<l.content.length;j++) c+='<div style="margin-bottom:10px;line-height:2;font-size:14px">'+l.content[j]+'</div>';}
  var w=window.open('','_blank'); w.document.write('<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>'+t+'</title><style>@page{size:Letter;margin:.55in .39in}body{font-family:Tahoma,Arial,sans-serif;margin:0;background:#fff}@media screen{body{background:#e5e7eb}.page{width:min(8.5in,calc(100vw - 40px));min-height:11in;margin:20px auto;background:#fff;padding:.5in;box-shadow:0 10px 40px rgba(0,0,0,.15)}}@media print{.page{width:100%;padding:0;box-shadow:none}}.header{text-align:center;padding-bottom:12px;border-bottom:2px solid #d4a843;margin-bottom:20px}.header h2{font-size:16px;color:#0c1a3a;margin:0 0 4px}.header p{font-size:11px;color:#8b92a5;margin:0}.title{text-align:center;font-size:22px;font-weight:900;color:#0b225a;margin-bottom:20px}.content{direction:rtl;text-align:right}.footer{text-align:center;padding-top:12px;border-top:1px solid #d6c288;margin-top:30px;font-size:10px;color:#8b92a5}</style></head><body><div class="page"><div class="header"><h2>المستشار اليمني القانوني</h2><p>المستشار اليمني القانوني</p></div><div class="title">'+t+'</div><div class="content">'+c+'</div><div class="footer">تم تجهيز النسخة للطباعة من المستشار اليمني القانوني | '+new Date().toLocaleDateString('ar')+'</div></div></body></html>'); w.document.close(); setTimeout(function(){w.print();},500);
  }catch(e){console.error(e);alert('تعذر تجهيز ملف الطباعة.');}
}
var stb=document.getElementById('scrollTop');
window.addEventListener('scroll',function(){stb.classList.toggle('visible',window.scrollY>300);},{passive:true});
loadCatalog().catch(function(e){console.error(e);document.getElementById('grid').innerHTML='<div class="empty-state">تعذر التحميل.</div>';});
</script>
</body>
</html>
