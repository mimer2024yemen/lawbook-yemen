<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القوانين | لوبوك</title>
<meta name="theme-color" content="#0c1a3a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a8a'/><text x='50' y='65' text-anchor='middle' font-size='45' fill='%23d4a843' font-weight='bold'>LB</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand">
      <div class="brand-icon">LB</div>
      <div><div class="brand-name">لوبوك</div></div>
    </a>
    <a href="index.html" class="back-btn">&#8594; الرئيسية</a>
  </div>
</nav>

<div class="container">
  <div class="page-head">
    <h1>القوانين اليمنية</h1>
    <p>بحث ذكي داخل القوانين والدعاوى مع ترتيب حسب الصلة</p>
  </div>

  <div class="toolbar">
    <div class="search-row">
      <div class="search-box"><input type="text" id="searchInput" placeholder="ابحث في القوانين... مثل: نفقة، فسخ، تجاري، شفعة"></div>
      <a href="index.html" class="btn btn-outline">&#127968; الرئيسية</a>
    </div>
    <div class="summary" id="resultSummary">جاري تحميل القوانين...</div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="grid" id="grid"><div class="empty">جاري تحميل البيانات...</div></div>
</div>

<footer class="footer-simple">&copy; 2026 لوبوك - المكتبة القانونية اليمنية</footer>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="العودة للأعلى">&#8593;</button>

<script src="search-utils.js"></script>
<script>
var catalog = null;
var fullDB = null;
var currentSection = 'all';
var currentLaws = [];
var lawSearchIndex = [];

var sectionTabs = [
  {k:'all',n:'الكل'},
  {k:'personal-status',n:'الأحوال الشخصية'},
  {k:'civil',n:'المدني'},
  {k:'commercial',n:'التجاري'},
  {k:'criminal',n:'الجنائي'},
  {k:'labor',n:'العمل'},
  {k:'litigation-procedures',n:'التقاضي'},
  {k:'yemeni-laws',n:'القوانين'}
];

async function loadCatalog(){
  var r = await fetch('catalog.json');
  catalog = await r.json();
  lawSearchIndex = LawbookSearch.buildIndex(catalog).filter(function(item){ return item.type === 'law'; });
  var p = new URLSearchParams(location.search);
  if(p.get('section')) currentSection = p.get('section');
  renderTabs();
  renderLaws();
}

async function ensureFullDB(){
  if(fullDB) return fullDB;
  var r = await fetch('database.json');
  fullDB = await r.json();
  return fullDB;
}

function updateUrl(){
  var url = new URL(location.href);
  if(currentSection && currentSection !== 'all') url.searchParams.set('section', currentSection); else url.searchParams.delete('section');
  history.replaceState(null, '', url.toString());
}

function renderTabs(){
  var html = '';
  for(var i=0;i<sectionTabs.length;i++){
    html += '<button class="tab'+(sectionTabs[i].k===currentSection?' active':'')+'" onclick="setSection(\''+sectionTabs[i].k+'\')">'+sectionTabs[i].n+'</button>';
  }
  document.getElementById('tabs').innerHTML = html;
}

function setSection(section){
  currentSection = section;
  updateUrl();
  renderTabs();
  renderLaws();
}

function renderLaws(){
  if(!catalog) return;
  var q = document.getElementById('searchInput').value.trim();
  var laws;
  if(q){
    laws = LawbookSearch.search(catalog, q, {types:['law'], section: currentSection==='all' ? '' : currentSection, limit: 500, index: lawSearchIndex});
  }else{
    laws = LawbookSearch.flattenLaws(catalog, currentSection).sort(function(a,b){ return (b.articleCount||0) - (a.articleCount||0) || a.title.localeCompare(b.title,'ar'); }).map(function(item){
      return {item:item, url:item.url, title:item.title, description:item.description, sectionLabel:item.sectionLabel, articleCount:item.articleCount, snippet:item.description};
    });
  }

  currentLaws = laws;
  document.getElementById('resultSummary').textContent = q
    ? 'تم العثور على ' + Number(laws.length).toLocaleString('en-US') + ' نتيجة مرتبة حسب الصلة.'
    : 'يعرض القسم الحالي ' + Number(laws.length).toLocaleString('en-US') + ' عنصرًا قانونيًا.';

  var html = '';
  for(var i=0;i<laws.length;i++){
    var x = laws[i];
    var law = x.item;
    html += '<div class="law-card">';
    html += '<div class="law-icon">&#9876;</div>';
    html += '<div class="law-info">';
    html += '<div class="meta"><span>'+LawbookSearch.escapeHtml(law.sectionLabel || x.sectionLabel || '')+'</span>' + ((law.articleCount||x.articleCount)?'<span>'+Number(law.articleCount||x.articleCount).toLocaleString('en-US')+' مادة</span>':'') + '</div>';
    html += '<h4>'+LawbookSearch.escapeHtml(law.title)+'</h4>';
    html += '<p>'+LawbookSearch.escapeHtml(x.snippet || law.description || '')+'</p>';
    html += '</div>';
    html += '<div class="law-actions">';
    html += '<button class="btn btn-gold" onclick="downloadPDF(\''+law.section+'\',\''+law.slug+'\')">&#128190; PDF</button>';
    html += '<a class="btn btn-blue" href="'+law.url+'">&#128065; عرض</a>';
    html += '</div></div>';
  }
  document.getElementById('grid').innerHTML = html || '<div class="empty">لا توجد نتائج مطابقة.</div>';
}

function filterLaws(){ renderLaws(); }
document.getElementById('searchInput').addEventListener('input', filterLaws);

function findLaw(section, slug){
  var arr = (((fullDB || {}).laws || {})[section] || []);
  for(var i=0;i<arr.length;i++) if(arr[i].slug === slug) return arr[i];
  return null;
}

async function downloadPDF(section, slug){
  try{
    await ensureFullDB();
    var law = findLaw(section, slug);
    if(!law){ window.location.href = 'viewer.html?type=law&section='+encodeURIComponent(section)+'&slug='+encodeURIComponent(slug); return; }
    var title = law.title || 'قانون';
    var content = '';
    if(law.articles && law.articles.length){
      for(var i=0;i<law.articles.length;i++){
        var a = law.articles[i];
        content += '<div style="margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #e5e8f0"><strong style="color:#0b225a">مادة ('+(a.number||'')+')</strong> <span>'+(a.text||'')+'</span></div>';
      }
    }else if(law.content){
      for(var j=0;j<law.content.length;j++) content += '<div style="margin-bottom:10px;line-height:2;font-size:14px">'+law.content[j]+'</div>';
    }
    var pdfHtml='<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>'+title+'</title><style>@page{size:Letter;margin:.55in .39in}body{font-family:Tahoma,Arial,sans-serif;margin:0;padding:0;background:#fff}@media screen{body{background:#e5e7eb}.page{width:min(8.5in,calc(100vw - 40px));min-height:11in;margin:20px auto;background:#fff;padding:.5in;box-shadow:0 10px 40px rgba(0,0,0,.15)}}@media print{.page{width:100%;padding:0;margin:0;box-shadow:none}}.header{text-align:center;padding-bottom:12px;border-bottom:2px solid #d4a843;margin-bottom:20px}.header h2{font-size:16px;color:#0c1a3a;margin:0 0 4px;font-weight:700}.header p{font-size:11px;color:#8b92a5;margin:0}.title{text-align:center;font-size:22px;font-weight:900;color:#0b225a;margin-bottom:20px;line-height:1.5}.content{direction:rtl;text-align:right}.footer{text-align:center;padding-top:12px;border-top:1px solid #d6c288;margin-top:30px;font-size:10px;color:#8b92a5}</style></head><body><div class="page"><div class="header"><h2>لوبوك - المكتبة القانونية اليمنية</h2><p>lawbook yemen</p></div><div class="title">'+title+'</div><div class="content">'+content+'</div><div class="footer">تم تجهيز النسخة للطباعة من لوبوك | '+new Date().toLocaleDateString('ar')+'</div></div></body></html>';
    var win = window.open('', '_blank');
    win.document.write(pdfHtml); win.document.close();
    setTimeout(function(){ win.print(); }, 500);
  }catch(error){
    console.error(error);
    alert('تعذر تجهيز ملف الطباعة الآن.');
  }
}

var scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', function(){
  scrollTopBtn.classList.toggle('visible', window.scrollY > 300);
}, {passive: true});

loadCatalog().catch(function(error){
  console.error(error);
  document.getElementById('grid').innerHTML = '<div class="empty">تعذر تحميل البيانات.</div>';
  document.getElementById('resultSummary').textContent = 'حدث خطأ أثناء التحميل.';
});
</script>
</body>
</html>
