<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العقود القانونية | لوبوك</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a8a'/><text x='50' y='65' text-anchor='middle' font-size='45' fill='%23d4a843' font-weight='bold'>LB</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--font:'IBM Plex Sans Arabic',sans-serif;--navy:#0c1a3a;--blue:#1e40af;--gold:#d4a843;--bg:#f4f6fa;--card:#fff;--text:#1a1f2e;--text-2:#5a6178;--text-3:#8b92a5;--border:#e5e8f0;--shadow-md:0 4px 12px rgba(0,0,0,.07);--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7}
.navbar{background:var(--navy);position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.navbar-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#f5c563);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--navy)}
.brand-name{font-size:20px;font-weight:700}
.back-btn{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;transition:all .15s}
.back-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.container{max-width:1200px;margin:0 auto;padding:0 20px}
.page-head{text-align:center;padding:40px 0 20px}
.page-head h1{font-size:2rem;font-weight:700;margin-bottom:6px}
.page-head p{color:var(--text-2);font-size:15px}
.search-box{margin:20px 0;text-align:center}
.search-box input{width:100%;max-width:500px;padding:12px 18px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);font-size:14px;font-family:var(--font);outline:none;direction:rtl}
.search-box input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.1)}
.tabs{display:flex;gap:6px;margin:16px 0;flex-wrap:wrap;justify-content:center}
.tab{padding:7px 14px;border-radius:8px;background:var(--card);border:1px solid var(--border);cursor:pointer;font-family:var(--font);font-size:13px;transition:all .15s;color:var(--text-2)}
.tab:hover,.tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin:16px 0;padding-bottom:40px}
.card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid var(--border);transition:all .15s;text-decoration:none;color:var(--text);display:block}
.card:hover{border-color:var(--gold);box-shadow:var(--shadow-md)}
.card h4{font-size:15px;font-weight:600;margin-bottom:8px}
.card p{font-size:13px;color:var(--text-2);line-height:1.6}
.card .meta{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text-3)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:var(--font;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-decoration:none;border:none}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-gold:hover{box-shadow:0 4px 12px rgba(212,168,67,.3)}
.btn-blue{background:var(--blue);color:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:16px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;padding:24px}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px}
.modal-content{font-size:14px;line-height:2;color:var(--text-2)}
.modal-content p{margin-bottom:10px}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.footer{background:var(--navy);color:rgba(255,255,255,.5);text-align:center;padding:24px;font-size:12px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="navbar"><div class="navbar-inner"><a href="index.html" class="brand"><div class="brand-icon">LB</div><div class="brand-name">لوبوك</div></a><a href="index.html" class="back-btn">&#8594; الرئيسية</a></div></nav>
<div class="container">
<div class="page-head"><h1>العقود القانونية</h1><p>نماذج عقود قانونية احترافية جاهزة للاستخدام</p></div>
<div class="search-box"><input type="text" id="searchInput" placeholder="ابحث في العقود..." oninput="filterContracts()"></div>
<div class="tabs" id="tabs"></div>
<div class="grid" id="grid"></div>
</div>
<div class="modal-overlay" id="modal"><div class="modal"><h3 id="modalTitle"></h3><div class="modal-content" id="modalContent"></div><div class="modal-actions"><button class="btn btn-gold" onclick="downloadContract()">&#128190; تحميل</button><button class="btn btn-blue" onclick="closeModal()">&#10005; إغلاق</button></div></div></div>
<footer class="footer">&copy; 2024 لوبوك - المنصة القانونية اليمنية</footer>
<script>
let db=null,cat='all',current=null;
async function load(){const r=await fetch('database.json');db=await r.json();const p=new URLSearchParams(location.search);if(p.get('category'))cat=p.get('category');renderTabs();renderContracts()}
function getCats(){const c={'الكل':[]};db.contracts.forEach(x=>{const t=x.title||x.slug;let k='أخرى';if(t.includes('بيع'))k='بيع';else if(t.includes('إيجار')||t.includes('سكن'))k='إيجار';else if(t.includes('شركة'))k='شركة';else if(t.includes('وكالة'))k='وكالة';else if(t.includes('قرض'))k='قرض';else if(t.includes('تنازل'))k='تنازل';else if(t.includes('إقرار'))k='إقرار';else if(t.includes('كفالة'))k='كفالة';if(!c[k])c[k]=[];c[k].push(x);c['الكل'].push(x)});return c}
function renderTabs(){const c=getCats();document.getElementById('tabs').innerHTML=Object.keys(c).map(k=>`<button class="tab${k===cat?' active':''}" onclick="setCat('${k}')">${k} (${c[k].length})</button>`).join('')}
function setCat(k){cat=k;renderTabs();renderContracts()}
function renderContracts(){const g=document.getElementById('grid'),q=document.getElementById('searchInput').value.trim().toLowerCase(),c=getCats();let contracts=cat==='الكل'?db.contracts:(c[cat]||[]);if(q)contracts=contracts.filter(x=>(x.title||'').toLowerCase().includes(q));if(!contracts.length){g.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-3);grid-column:1/-1">لا توجد عقود</div>';return}g.innerHTML=contracts.map((x,i)=>`<div class="card" onclick="showContract(${i})"><h4>${x.title||x.slug}</h4><p>${(x.content||[])[0]||'عقد قانوني جاهز'}</p><div class="meta"><span>${(x.content||[]).length} بند</span><span style="color:var(--gold)">عرض العقد</span></div></div>`).join('')}
function showContract(i){const c=getCats(),contracts=cat==='الكل'?db.contracts:(c[cat]||[]);current=contracts[i];if(!current)return;document.getElementById('modalTitle').textContent=current.title||current.slug;document.getElementById('modalContent').innerHTML=(current.content||[]).map(b=>`<p>${b}</p>`).join('');document.getElementById('modal').classList.add('show')}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function downloadContract(){if(!current)return;let t=current.title+'\n'+'='.repeat(50)+'\n\n';(current.content||[]).forEach(b=>{t+=b+'\n\n'});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/plain;charset=utf-8'}));a.download=(current.title||'contract')+'.txt';a.click()}
function filterContracts(){renderContracts()}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
load();
</script>
</body>
</html>
