<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>العقود | لوبوك</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a8a'/><text x='50' y='65' text-anchor='middle' font-size='45' fill='%23d4a843' font-weight='bold'>LB</text></svg>">
<style>
:root{--font:Tahoma,Arial,sans-serif;--navy:#0c1a3a;--blue:#1e40af;--gold:#d4a843;--bg:#f4f6fa;--card:#fff;--text:#1a1f2e;--text2:#5a6178;--text3:#8b92a5;--border:#e5e8f0;--shadow-md:0 4px 12px rgba(0,0,0,.07);--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7}
.navbar{background:var(--navy);position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.navbar-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#f5c563);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--navy)}.brand-name{font-size:20px;font-weight:700}
.back-btn{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px}.back-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.container{max-width:1200px;margin:0 auto;padding:0 20px}.page-head{text-align:center;padding:40px 0 20px}.page-head h1{font-size:2rem;font-weight:700;margin-bottom:6px}.page-head p{color:var(--text2);font-size:15px}
.toolbar{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-md);border-radius:18px;padding:16px;margin-bottom:18px}
.search-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.search-box{flex:1;min-width:260px}.search-box input{width:100%;padding:12px 18px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);font-size:14px;font-family:var(--font);outline:none;direction:rtl}.search-box input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.08)}
.summary{margin-top:10px;font-size:13px;color:var(--text2)}
.tabs{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;justify-content:center}.tab{padding:7px 14px;border-radius:8px;background:var(--card);border:1px solid var(--border);cursor:pointer;font-family:var(--font);font-size:13px;transition:all .15s;color:var(--text2)}.tab:hover,.tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin:20px 0;padding-bottom:40px}.card{background:var(--card);border-radius:var(--r);padding:20px;border:1px solid var(--border);transition:all .15s}.card:hover{border-color:var(--gold);box-shadow:var(--shadow-md)}.card h4{font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.6}.card p{font-size:13px;color:var(--text2);line-height:1.8}.card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.card-meta span{background:#fff7e6;color:#936700;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}.card-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-decoration:none;border:none}.btn-gold{background:var(--gold);color:var(--navy)}.btn-blue{background:var(--blue);color:#fff}.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{border-color:var(--gold);color:#946c00}
.empty{background:var(--card);border:1px dashed var(--border);border-radius:18px;padding:36px;text-align:center;color:var(--text3)}.footer{background:var(--navy);color:rgba(255,255,255,.5);text-align:center;padding:24px;font-size:12px}
@media(max-width:768px){.navbar-inner{height:56px}.page-head{padding:30px 0 16px}.page-head h1{font-size:1.6rem}.tabs{gap:4px}.tab{padding:6px 10px;font-size:12px}.grid{grid-template-columns:1fr;gap:12px}.card{padding:14px}.card h4{font-size:14px}.card p{font-size:12px}.card-actions{flex-wrap:wrap;gap:6px}.card-actions .btn{flex:1;justify-content:center;font-size:11px;padding:6px 10px}}
@media(max-width:480px){.container{padding:0 12px}.page-head h1{font-size:1.4rem}.tab{font-size:11px;padding:5px 8px}}
</style>
</head>
<body>
<nav class="navbar"><div class="navbar-inner"><a href="index.html" class="brand"><div class="brand-icon">LB</div><div class="brand-name">لوبوك</div></a><a href="index.html" class="back-btn">&#8594; الرئيسية</a></div></nav>
<div class="container">
  <div class="page-head"><h1>نماذج العقود</h1><p>بحث ذكي وفرز أسرع داخل نماذج العقود القانونية</p></div>
  <div class="toolbar">
    <div class="search-row">
      <div class="search-box"><input type="text" id="searchInput" placeholder="ابحث في العقود... مثل: بيع، إيجار، شركة، وكالة"></div>
      <a href="index.html" class="btn btn-outline">&#127968; الرئيسية</a>
    </div>
    <div class="summary" id="resultSummary">جاري تحميل العقود...</div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="grid" id="grid"><div class="empty">جاري تحميل البيانات...</div></div>
</div>
<footer class="footer">&copy; 2026 لوبوك - المكتبة القانونية اليمنية</footer>
<script src="search-utils.js"></script>
<script>
var catalog = null;
var fullDB = null;
var currentCategory = 'الكل';
var currentContracts = [];
var contractSearchIndex = [];

async function loadCatalog(){
  var r = await fetch('catalog.json');
  catalog = await r.json();
  contractSearchIndex = LawbookSearch.buildIndex(catalog).filter(function(item){ return item.type === 'contract'; });
  var p = new URLSearchParams(location.search);
  if(p.get('category')) currentCategory = decodeURIComponent(p.get('category'));
  renderTabs();
  renderContracts();
}

async function ensureFullDB(){
  if(fullDB) return fullDB;
  var r = await fetch('database.json');
  fullDB = await r.json();
  return fullDB;
}

function groupedContracts(){
  var groups = {'الكل':[]};
  for(var i=0;i<catalog.contracts.length;i++){
    var x = catalog.contracts[i];
    var c = x.category || 'أخرى';
    if(!groups[c]) groups[c] = [];
    groups[c].push(x);
    groups['الكل'].push(x);
  }
  return groups;
}

function renderTabs(){
  var groups = groupedContracts();
  var html = '';
  Object.keys(groups).sort(function(a,b){
    if(a === 'الكل') return -1;
    if(b === 'الكل') return 1;
    return groups[b].length - groups[a].length || a.localeCompare(b,'ar');
  }).forEach(function(name){
    html += '<button class="tab'+(name===currentCategory?' active':'')+'" onclick="setCategory(\''+name+'\')">'+name+' ('+groups[name].length+')</button>';
  });
  document.getElementById('tabs').innerHTML = html;
}

function updateUrl(){
  var url = new URL(location.href);
  if(currentCategory && currentCategory !== 'الكل') url.searchParams.set('category', currentCategory); else url.searchParams.delete('category');
  history.replaceState(null, '', url.toString());
}

function setCategory(name){
  currentCategory = name;
  updateUrl();
  renderTabs();
  renderContracts();
}

function renderContracts(){
  if(!catalog) return;
  var q = document.getElementById('searchInput').value.trim();
  var contracts;
  if(q){
    contracts = LawbookSearch.search(catalog, q, {types:['contract'], limit:500, index: contractSearchIndex}).map(function(x){ return x.item; });
  }else{
    contracts = catalog.contracts.slice();
  }
  if(currentCategory !== 'الكل') contracts = contracts.filter(function(item){ return (item.category || 'أخرى') === currentCategory; });
  contracts.sort(function(a,b){ return a.title.localeCompare(b.title,'ar'); });
  currentContracts = contracts;
  document.getElementById('resultSummary').textContent = q
    ? 'تم العثور على ' + Number(contracts.length).toLocaleString('en-US') + ' نتيجة داخل العقود.'
    : 'يعرض التصنيف الحالي ' + Number(contracts.length).toLocaleString('en-US') + ' عقدًا.';

  var html = '';
  for(var i=0;i<contracts.length;i++){
    var x = contracts[i];
    html += '<div class="card">';
    html += '<div class="card-meta"><span>'+LawbookSearch.escapeHtml(x.category || 'أخرى')+'</span></div>';
    html += '<h4>'+LawbookSearch.escapeHtml(x.title || x.slug || 'عقد')+'</h4>';
    html += '<p>'+LawbookSearch.escapeHtml(x.description || '')+'</p>';
    html += '<div class="card-actions">';
    html += '<button class="btn btn-gold" onclick="downloadPDF('+i+')">&#128190; PDF</button>';
    html += '<a class="btn btn-blue" href="'+x.url+'">&#128065; عرض</a>';
    html += '<button class="btn btn-outline" onclick="downloadTXT('+i+')">&#128196; نص</button>';
    html += '</div></div>';
  }
  document.getElementById('grid').innerHTML = html || '<div class="empty">لا توجد نتائج مطابقة.</div>';
}

document.getElementById('searchInput').addEventListener('input', renderContracts);

function findContract(slug){
  var arr = (fullDB && fullDB.contracts) || [];
  for(var i=0;i<arr.length;i++) if(arr[i].slug === slug) return arr[i];
  return null;
}

async function downloadTXT(index){
  try{
    await ensureFullDB();
    var item = currentContracts[index];
    var x = item && findContract(item.slug);
    if(!x) return;
    var text=(x.title||'عقد')+'\n==================================================\n\n';
    if(x.content){ for(var j=0;j<x.content.length;j++) text += x.content[j]+'\n\n'; }
    text+='==================================================\nلوبوك - المكتبة القانونية اليمنية\n';
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));
    a.download=(x.title||'contract')+'.txt';
    a.click();
  }catch(error){ console.error(error); alert('تعذر تنزيل النص الآن.'); }
}

async function downloadPDF(index){
  try{
    await ensureFullDB();
    var item = currentContracts[index];
    var x = item && findContract(item.slug);
    if(!x) return;
    var title = x.title || 'عقد';
    var content = '';
    if(x.content){ for(var j=0;j<x.content.length;j++) content += '<div style="margin-bottom:10px;line-height:2;font-size:14px">'+x.content[j]+'</div>'; }
    var pdfHtml='<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>'+title+'</title><style>@page{size:Letter;margin:.55in .39in}body{font-family:Tahoma,Arial,sans-serif;margin:0;padding:0;background:#fff}@media screen{body{background:#e5e7eb}.page{width:min(8.5in,calc(100vw - 40px));min-height:11in;margin:20px auto;background:#fff;padding:.5in;box-shadow:0 10px 40px rgba(0,0,0,.15)}}@media print{.page{width:100%;padding:0;margin:0;box-shadow:none}}.header{text-align:center;padding-bottom:12px;border-bottom:2px solid #d4a843;margin-bottom:20px}.header h2{font-size:16px;color:#0c1a3a;margin:0 0 4px;font-weight:700}.header p{font-size:11px;color:#8b92a5;margin:0}.title{text-align:center;font-size:22px;font-weight:900;color:#0b225a;margin-bottom:20px;line-height:1.5}.content{direction:rtl;text-align:right}.footer{text-align:center;padding-top:12px;border-top:1px solid #d6c288;margin-top:30px;font-size:10px;color:#8b92a5}</style></head><body><div class="page"><div class="header"><h2>لوبوك - المكتبة القانونية اليمنية</h2><p>lawbook yemen</p></div><div class="title">'+title+'</div><div class="content">'+content+'</div><div class="footer">تم تجهيز النسخة للطباعة من لوبوك | '+new Date().toLocaleDateString('ar')+'</div></div></body></html>';
    var win = window.open('', '_blank');
    win.document.write(pdfHtml); win.document.close();
    setTimeout(function(){ win.print(); }, 500);
  }catch(error){ console.error(error); alert('تعذر تجهيز ملف الطباعة الآن.'); }
}

loadCatalog().catch(function(error){
  console.error(error);
  document.getElementById('grid').innerHTML = '<div class="empty">تعذر تحميل البيانات.</div>';
  document.getElementById('resultSummary').textContent = 'حدث خطأ أثناء التحميل.';
});
</script>
</body>
</html>
