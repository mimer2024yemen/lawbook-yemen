<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض المحتوى | لوبوك</title>
<meta name="theme-color" content="#0c1a3a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a8a'/><text x='50' y='65' text-anchor='middle' font-size='45' fill='%23d4a843' font-weight='bold'>LB</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="brand">
      <div class="brand-icon">LB</div>
      <div><div class="brand-name">لوبوك</div></div>
    </a>
    <a id="backLink" href="index.html" class="back-btn">&#8594; رجوع</a>
  </div>
</nav>

<div class="viewer-wrap">
  <section class="viewer-hero">
    <div class="badges" id="badges"></div>
    <h1 id="title">جاري التحميل...</h1>
    <p id="description">يتم تجهيز المحتوى المحلي من مكتبة الموقع.</p>
    <div class="actions">
      <button class="btn btn-gold" onclick="window.print()" style="padding:10px 16px;font-size:14px">&#128424; طباعة / PDF</button>
      <button class="btn btn-outline" onclick="downloadTXT()" style="padding:10px 16px;font-size:14px;border:1px solid var(--border)">&#128196; تنزيل نص</button>
      <a class="btn btn-blue" id="homeBtn" href="index.html" style="padding:10px 16px;font-size:14px">الرئيسية</a>
    </div>
  </section>

  <div class="layout">
    <article class="main-card" id="contentArea"><div class="empty">جاري تحميل المحتوى...</div></article>
    <aside class="side-card">
      <h3>تنقل سريع</h3>
      <div id="quickLinks"></div>
    </aside>
  </div>
</div>

<footer class="footer-simple">جميع المواد المعروضة هنا تُفتح محليًا داخل موقع لوبوك دون تحويل المستخدم إلى موقع خارجي.</footer>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="العودة للأعلى">&#8593;</button>

<script>
var currentItem=null;
var typeLabels={law:'قانون',contract:'عقد',post:'مقال'};
var sectionLabels={
  'civil':'الدعاوى المدنية','personal-status':'الأحوال الشخصية','litigation-procedures':'إجراءات التقاضي',
  'criminal':'الجرائم الجنائية','labor':'العمل','yemeni-laws':'القوانين اليمنية','legal-procedure-deadlines':'مواعيد الإجراءات القانونية',
  'urgent':'الدعاوى المستعجلة','commercial':'الدعاوى التجارية'
};
function esc(s){return (s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function params(){return new URLSearchParams(location.search)}
function getBackLink(type,section){
  if(type==='law') return section ? 'laws.html?section='+encodeURIComponent(section) : 'laws.html';
  if(type==='contract') return 'contracts.html';
  if(type==='post') return 'posts.html';
  return 'index.html';
}
function renderBadges(type,section,item){
  var html='';
  html+='<span class="badge badge-blue">'+(typeLabels[type]||'محتوى')+'</span>';
  if(section && sectionLabels[section]) html+='<span class="badge badge-gold">'+sectionLabels[section]+'</span>';
  if(item.articles && item.articles.length) html+='<span class="badge badge-blue">'+item.articles.length+' مادة</span>';
  document.getElementById('badges').innerHTML=html;
}
function renderQuickLinks(type,section,item){
  var html='';
  html+='<a href="'+getBackLink(type,section)+'">&#128214; العودة إلى القسم</a>';
  html+='<a href="index.html">&#127968; الصفحة الرئيسية</a>';
  if(type!=='law') html+='<a href="laws.html">&#9876; تصفح القوانين</a>';
  if(type!=='contract') html+='<a href="contracts.html">&#128221; تصفح العقود</a>';
  if(type!=='post') html+='<a href="posts.html">&#128240; تصفح المقالات</a>';
  document.getElementById('quickLinks').innerHTML=html;
}
function paragraphBlocks(content){
  var html='';
  for(var i=0;i<content.length;i++){
    if(!content[i]) continue;
    html+='<div class="content-block"><p>'+esc(content[i])+'</p></div>';
  }
  return html;
}
function renderItem(type,section,item){
  currentItem={type:type,section:section,item:item};
  document.title=(item.title||'عرض المحتوى')+' | لوبوك';
  document.getElementById('title').textContent=item.title||'بدون عنوان';
  document.getElementById('description').textContent=item.description||'عرض محلي للمحتوى القانوني داخل موقع لوبوك.';
  document.getElementById('backLink').href=getBackLink(type,section);
  renderBadges(type,section,item);
  renderQuickLinks(type,section,item);
  var html='';
  if(item.content && item.content.length){
    html+=paragraphBlocks(item.content);
  }
  if(item.articles && item.articles.length){
    html+='<div style="height:8px"></div><h2 style="margin:8px 0 14px;color:var(--navy);font-size:20px">النصوص والمواد</h2>';
    html+='<div class="articles">';
    for(var i=0;i<item.articles.length;i++){
      var a=item.articles[i];
      html+='<div class="article-card-sm"><h4>مادة ('+esc(a.number||String(i+1))+')</h4><p>'+esc(a.text||'')+'</p></div>';
    }
    html+='</div>';
  }
  document.getElementById('contentArea').innerHTML=html||'<div class="empty">لا يوجد محتوى متاح لهذا العنصر.</div>';
}
function findItem(db,type,section,slug){
  if(type==='law'){
    if(section && db.laws[section]){
      for(var i=0;i<db.laws[section].length;i++) if(db.laws[section][i].slug===slug) return db.laws[section][i];
    }
    var keys=Object.keys(db.laws||{});
    for(var k=0;k<keys.length;k++){
      var arr=db.laws[keys[k]]||[];
      for(var j=0;j<arr.length;j++) if(arr[j].slug===slug) return arr[j];
    }
  }
  var arr = type==='contract' ? (db.contracts||[]) : (db.posts||[]);
  for(var x=0;x<arr.length;x++) if(arr[x].slug===slug) return arr[x];
  return null;
}
async function load(){
  var p=params();
  var type=p.get('type')||'law';
  var section=p.get('section')||'';
  var slug=p.get('slug')||'';
  try{
    var r=await fetch('database.json');
    var db=await r.json();
    var item=findItem(db,type,section,slug);
    if(!item){
      document.getElementById('title').textContent='المحتوى غير موجود';
      document.getElementById('description').textContent='لم يتم العثور على المادة المطلوبة داخل قاعدة البيانات المحلية.';
      document.getElementById('contentArea').innerHTML='<div class="empty">تأكد من الرابط أو ارجع إلى الفهرس.</div>';
      renderQuickLinks(type,section,{});
      return;
    }
    renderItem(type,section,item);
  }catch(e){
    document.getElementById('title').textContent='تعذر تحميل المحتوى';
    document.getElementById('description').textContent='حدث خطأ أثناء قراءة قاعدة البيانات المحلية.';
    document.getElementById('contentArea').innerHTML='<div class="empty">يرجى إعادة المحاولة.</div>';
  }
}
function downloadTXT(){
  if(!currentItem) return;
  var x=currentItem.item;
  var parts=[x.title||'محتوى قانوني','========================================',''];
  if(x.description) parts.push(x.description,'');
  if(x.content){ for(var i=0;i<x.content.length;i++) parts.push(x.content[i],''); }
  if(x.articles && x.articles.length){
    parts.push('المواد','');
    for(var j=0;j<x.articles.length;j++) parts.push('مادة ('+(x.articles[j].number||String(j+1))+')',''+(x.articles[j].text||''),'');
  }
  var blob=new Blob([parts.join('\n')],{type:'text/plain;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(x.slug||'content')+'.txt';
  a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href)},1000);
}

var scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', function(){
  scrollTopBtn.classList.toggle('visible', window.scrollY > 300);
}, {passive: true});

load();
</script>
</body>
</html>
