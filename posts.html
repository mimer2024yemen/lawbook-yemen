<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المقالات القانونية | لوبوك</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a8a'/><text x='50' y='65' text-anchor='middle' font-size='45' fill='%23d4a843' font-weight='bold'>LB</text></svg>">
<style>
:root{--font:Tahoma,Arial,sans-serif;--navy:#0c1a3a;--blue:#1e40af;--gold:#d4a843;--bg:#f4f6fa;--card:#fff;--text:#1a1f2e;--text2:#5a6178;--text3:#8b92a5;--border:#e5e8f0;--shadow-md:0 4px 12px rgba(0,0,0,.07);--r:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7}
.navbar{background:var(--navy);position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.navbar-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px}.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#f5c563);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:var(--navy)}.brand-name{font-size:20px;font-weight:700}.back-btn{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px}.back-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.container{max-width:1200px;margin:0 auto;padding:0 20px}.page-head{text-align:center;padding:40px 0 20px}.page-head h1{font-size:2rem;font-weight:700;margin-bottom:6px}.page-head p{color:var(--text2);font-size:15px}
.toolbar{background:var(--card);border:1px solid var(--border);box-shadow:var(--shadow-md);border-radius:18px;padding:16px;margin-bottom:18px}.search-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.search-box{flex:1;min-width:260px}.search-box input{width:100%;padding:12px 18px;border-radius:var(--r);border:1px solid var(--border);background:var(--card);font-size:14px;font-family:var(--font);outline:none;direction:rtl}.search-box input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,64,175,.08)}.summary{margin-top:10px;font-size:13px;color:var(--text2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin:20px 0;padding-bottom:40px}.article-card{background:var(--card);border-radius:var(--r);padding:20px;border:1px solid var(--border);transition:all .2s;text-decoration:none;color:var(--text);display:block}.article-card:hover{border-color:var(--blue);box-shadow:var(--shadow-md);transform:translateY(-2px)}.article-badge{display:inline-block;background:rgba(30,64,175,.06);color:var(--blue);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:10px}.article-card h3{font-size:16px;font-weight:700;margin-bottom:8px;line-height:1.6}.article-card p{font-size:13px;color:var(--text2);line-height:1.8}.article-meta{display:flex;align-items:center;gap:12px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}.empty{background:var(--card);border:1px dashed var(--border);border-radius:18px;padding:36px;text-align:center;color:var(--text3)}.footer{background:var(--navy);color:rgba(255,255,255,.5);text-align:center;padding:24px;font-size:12px}
@media(max-width:768px){.navbar-inner{height:56px}.page-head{padding:30px 0 16px}.page-head h1{font-size:1.6rem}.grid{grid-template-columns:1fr;gap:12px}.article-card{padding:14px}.article-card h3{font-size:14px}.article-card p{font-size:12px}}
@media(max-width:480px){.container{padding:0 12px}.page-head h1{font-size:1.4rem}}
</style>
</head>
<body>
<nav class="navbar"><div class="navbar-inner"><a href="index.html" class="brand"><div class="brand-icon">LB</div><div class="brand-name">لوبوك</div></a><a href="index.html" class="back-btn">&#8594; الرئيسية</a></div></nav>
<div class="container">
  <div class="page-head"><h1>المقالات القانونية</h1><p>مقالات قانونية توعوية وشروحات عملية مع بحث أسرع</p></div>
  <div class="toolbar">
    <div class="search-row">
      <div class="search-box"><input type="text" id="searchInput" placeholder="ابحث في المقالات... مثل: شريك، عقد البيع، الحيازة"></div>
      <a href="index.html" class="back-btn" style="color:var(--text2);background:#fff;border:1px solid var(--border)">&#127968; الرئيسية</a>
    </div>
    <div class="summary" id="resultSummary">جاري تحميل المقالات...</div>
  </div>
  <div class="grid" id="grid"><div class="empty">جاري تحميل المقالات...</div></div>
</div>
<footer class="footer">&copy; 2026 لوبوك - المكتبة القانونية اليمنية</footer>
<script src="search-utils.js"></script>
<script>
var catalog = null;
var currentPosts = [];
var postSearchIndex = [];

async function loadCatalog(){
  var r = await fetch('catalog.json');
  catalog = await r.json();
  postSearchIndex = LawbookSearch.buildIndex(catalog).filter(function(item){ return item.type === 'post'; });
  renderPosts();
}

function renderPosts(){
  if(!catalog) return;
  var q = document.getElementById('searchInput').value.trim();
  var posts;
  if(q){
    posts = LawbookSearch.search(catalog, q, {types:['post'], limit:200, index: postSearchIndex}).map(function(x){ return x.item; });
  }else{
    posts = catalog.posts.slice();
  }
  currentPosts = posts;
  document.getElementById('resultSummary').textContent = q
    ? 'تم العثور على ' + Number(posts.length).toLocaleString('en-US') + ' مقالة.'
    : 'عدد المقالات المتاحة: ' + Number(posts.length).toLocaleString('en-US');

  var html = '';
  for(var i=0;i<posts.length;i++){
    var p = posts[i];
    html += '<a href="'+p.url+'" class="article-card">';
    html += '<span class="article-badge">مقال قانوني</span>';
    html += '<h3>'+LawbookSearch.escapeHtml(p.title)+'</h3>';
    html += '<p>'+LawbookSearch.escapeHtml(p.description || '')+'</p>';
    html += '<div class="article-meta"><span>لوبوك</span><span>عرض داخل الموقع</span></div>';
    html += '</a>';
  }
  document.getElementById('grid').innerHTML = html || '<div class="empty">لا توجد نتائج مطابقة.</div>';
}

document.getElementById('searchInput').addEventListener('input', renderPosts);

loadCatalog().catch(function(error){
  console.error(error);
  document.getElementById('grid').innerHTML = '<div class="empty">تعذر تحميل المقالات.</div>';
  document.getElementById('resultSummary').textContent = 'حدث خطأ أثناء التحميل.';
});
</script>
</body>
</html>
