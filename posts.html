<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المقالات | المستشار اليمني القانوني</title>
<meta name="description" content="المستشار اليمني القانوني — مساعد قانوني ذكي متخصص في القوانين والتشريعات اليمنية. ابحث في أكثر من 12,000 مادة قانونية.">
<meta name="theme-color" content="#0a1628">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a8a'/><text x='50' y='65' text-anchor='middle' font-size='45' fill='%23d4a843' font-weight='bold'>م.ق</text></svg>">
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<script src="monitor.js"></script>
<script src="app.js"></script>
</head>
<body>
<nav class="navbar"><div class="navbar-inner"><a href="index.html" class="brand"><div class="brand-icon">م.ق</div><div class="brand-text"><div class="brand-name">المستشار اليمني القانوني</div></div></a><a href="advisor.html" class="back-btn" style="margin-left:8px">⚖️ المستشار</a><a href="index.html" class="back-btn">← الرئيسية</a></div></nav>

<div class="container">
  <div class="page-header"><h1>المقالات القانونية</h1><p>مقالات توعوية وشروحات عملية مع بحث أسرع</p></div>
  <div class="toolbar">
    <div class="search-row">
      <div class="search-field"><span class="field-icon icon icon-sm"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span><input type="text" id="searchInput" placeholder="ابحث في المقالات..."></div>
      <a href="index.html" class="btn btn-outline">🏠 الرئيسية</a>
    </div>
    <div class="summary" id="resultSummary">جاري التحميل...</div>
  </div>
  <div class="grid" id="grid"><div class="empty-state">جاري التحميل...</div></div>
</div>

<footer class="footer-simple">&copy; 2026 المستشار اليمني القانوني — المستشار اليمني القانوني</footer>
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script src="search-engine.js"></script>
<script>
var catalog=null, postSearchIndex=[];
async function loadCatalog(){ catalog=await App.loadCatalog(); postSearchIndex=LawbookSearch.buildIndex(catalog).filter(function(i){return i.type==='post';}); renderPosts(); }
function renderPosts(){
  if(!catalog) return;
  var q=document.getElementById('searchInput').value.trim(),posts;
  if(q){ posts=LawbookSearch.search(postSearchIndex,q,{types:['post'],limit:200}).map(function(x){return x.item;}); }
  else{ posts=catalog.posts.slice(); }
  document.getElementById('resultSummary').textContent=q?'تم العثور على '+posts.length.toLocaleString('en-US')+' مقالة':'عدد المقالات: '+posts.length.toLocaleString('en-US');
  var h='';
  for(var i=0;i<posts.length;i++){
    var p=posts[i];
    h+='<a href="'+p.url+'" class="article-card"><span class="tag" style="margin-bottom:10px;display:inline-block">مقال قانوني</span>';
    h+='<h3>'+LawbookSearch.highlightText(p.title,q)+'</h3>';
    h+='<p>'+LawbookSearch.escapeHtml(p.description||'')+'</p>';
    h+='<div class="card-meta-bottom"><span>المستشار اليمني القانوني</span><span>عرض داخل الموقع</span></div></a>';
  }
  document.getElementById('grid').innerHTML=h||'<div class="empty-state">لا توجد نتائج.</div>';
}
document.getElementById('searchInput').addEventListener('input',renderPosts);
var stb=document.getElementById('scrollTop');
window.addEventListener('scroll',function(){stb.classList.toggle('visible',window.scrollY>300);},{passive:true});
loadCatalog().catch(function(e){console.error(e);document.getElementById('grid').innerHTML='<div class="empty-state">تعذر التحميل.</div>';});
</script>
</body>
</html>
