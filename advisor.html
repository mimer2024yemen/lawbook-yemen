<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>المستشار اليمني القانوني</title>
<meta name="description" content="مستشار قانوني ذكي يجيب على أسئلتك القانونية بنصوص يمنية حقيقية — مجاني بالكامل">
<meta name="theme-color" content="#0a1628">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231e3a8a'/><text x='50' y='65' text-anchor='middle' font-size='45' fill='%23d4a843' font-weight='bold'>م.ق</text></svg>">
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<script src="monitor.js"></script>
<script src="app.js"></script>
<style>
/* ===== ChatGPT-like Layout ===== */
:root{--chat-bg:#0f1117;--chat-surface:#1e1e2e;--chat-border:#2d2d3f;--chat-text:#e4e4e7;--chat-muted:#8b8b9e;--chat-user:#2563eb;--chat-ai-surface:#27272a;--chat-gold:#d4a843;--chat-green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',Tahoma,'Noto Sans Arabic',Arial,sans-serif;background:var(--chat-bg);color:var(--chat-text);line-height:1.7}

.app{display:flex;height:100vh;height:100dvh}

/* Sidebar */
.sidebar{width:280px;background:#17171f;border-left:1px solid var(--chat-border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--chat-border)}
.new-chat-btn{width:100%;padding:12px 16px;background:transparent;border:1px solid var(--chat-border);border-radius:10px;color:var(--chat-text);font-size:14px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
.new-chat-btn:hover{background:rgba(255,255,255,.05);border-color:var(--chat-gold)}
.chat-list{flex:1;overflow-y:auto;padding:8px}
.chat-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--chat-muted);transition:all .15s;margin-bottom:2px;display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.chat-item:hover{background:rgba(255,255,255,.05);color:var(--chat-text)}
.chat-item.active{background:rgba(255,255,255,.08);color:var(--chat-text)}
.chat-item-icon{flex-shrink:0;font-size:14px}
.chat-item-title{overflow:hidden;text-overflow:ellipsis}
.chat-item-delete{opacity:0;transition:opacity .15s;font-size:12px;color:var(--chat-muted);margin-right:auto;padding:4px}
.chat-item:hover .chat-item-delete{opacity:1}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--chat-border)}
.sidebar-footer a{display:flex;align-items:center;gap:8px;color:var(--chat-muted);text-decoration:none;font-size:13px;padding:8px;border-radius:8px;transition:all .15s}
.sidebar-footer a:hover{background:rgba(255,255,255,.05);color:var(--chat-text)}

/* Main Chat Area */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Top Bar */
.topbar{padding:12px 20px;border-bottom:1px solid var(--chat-border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--chat-bg)}
.topbar-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.topbar-title .dot{width:8px;height:8px;background:var(--chat-green);border-radius:50%;display:inline-block}
.topbar-actions{display:flex;gap:8px}
.topbar-btn{padding:6px 12px;border-radius:6px;background:transparent;border:1px solid var(--chat-border);color:var(--chat-muted);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.topbar-btn:hover{background:rgba(255,255,255,.05);color:var(--chat-text)}

/* Chat Messages Area */
.chat-area{flex:1;overflow-y:auto;scroll-behavior:smooth}
.chat-scroll{max-width:800px;margin:0 auto;padding:20px 24px 100px}

/* Welcome */
.welcome{text-align:center;padding:60px 20px 40px}
.welcome-icon{font-size:48px;margin-bottom:16px}
.welcome h1{font-size:1.8rem;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,var(--chat-gold),#f5c563);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.welcome p{color:var(--chat-muted);font-size:14px;max-width:500px;margin:0 auto 32px;line-height:1.8}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;max-width:600px;margin:0 auto}
.quick-btn{background:var(--chat-surface);border:1px solid var(--chat-border);border-radius:10px;padding:14px 16px;text-align:right;font-size:13px;color:var(--chat-muted);cursor:pointer;transition:all .2s;font-family:inherit;line-height:1.6}
.quick-btn:hover{border-color:var(--chat-gold);color:var(--chat-text);transform:translateY(-1px)}

/* Message */
.msg{display:flex;gap:12px;margin-bottom:24px;animation:fadeIn .3s ease}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}
.msg.ai .msg-avatar{background:linear-gradient(135deg,var(--chat-gold),#f5c563)}
.msg.user .msg-avatar{background:var(--chat-user)}
.msg-content{max-width:85%;min-width:0}
.msg-bubble{padding:16px 20px;border-radius:14px;font-size:14px;line-height:1.9}
.msg.user .msg-bubble{background:var(--chat-user);color:#fff;border-bottom-left-radius:4px}
.msg.ai .msg-bubble{background:var(--chat-ai-surface);border:1px solid var(--chat-border);border-bottom-right-radius:4px}

/* Markdown Styles */
.msg.ai .msg-bubble h1,.msg.ai .msg-bubble h2,.msg.ai .msg-bubble h3{color:var(--chat-gold);margin:16px 0 8px;font-weight:700}
.msg.ai .msg-bubble h2{font-size:15px;border-bottom:1px solid var(--chat-border);padding-bottom:6px}
.msg.ai .msg-bubble h3{font-size:14px}
.msg.ai .msg-bubble p{margin-bottom:10px}
.msg.ai .msg-bubble ul,.msg.ai .msg-bubble ol{margin:8px 0 12px 20px;font-size:14px}
.msg.ai .msg-bubble li{margin-bottom:4px}
.msg.ai .msg-bubble blockquote{border-right:3px solid var(--chat-gold);padding:10px 16px;margin:12px 0;background:rgba(212,168,67,.06);border-radius:0 8px 8px 0;font-size:13px;color:var(--chat-muted)}
.msg.ai .msg-bubble code{background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;font-size:13px}
.msg.ai .msg-bubble pre{background:rgba(0,0,0,.3);padding:14px;border-radius:8px;overflow-x:auto;margin:10px 0}
.msg.ai .msg-bubble pre code{background:none;padding:0}
.msg.ai .msg-bubble table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.msg.ai .msg-bubble th,.msg.ai .msg-bubble td{border:1px solid var(--chat-border);padding:8px 12px;text-align:right}
.msg.ai .msg-bubble th{background:rgba(212,168,67,.08);color:var(--chat-gold);font-weight:600}
.msg.ai .msg-bubble hr{border:none;border-top:1px solid var(--chat-border);margin:16px 0}
.msg.ai .msg-bubble strong{color:var(--chat-gold)}
.msg.ai .msg-bubble a{color:var(--chat-gold);text-decoration:underline}
.msg.ai .msg-bubble a:hover{color:#f5c563}

/* Streaming cursor */
.streaming-cursor{display:inline-block;width:2px;height:16px;background:var(--chat-gold);animation:blink 1s infinite;vertical-align:middle;margin-right:2px}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Message Actions */
.msg-actions{display:flex;gap:4px;margin-top:8px;opacity:0;transition:opacity .2s}
.msg:hover .msg-actions{opacity:1}
.msg-action{padding:4px 8px;border-radius:4px;background:transparent;border:none;color:var(--chat-muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.msg-action:hover{background:rgba(255,255,255,.05);color:var(--chat-text)}

/* Typing Indicator */
.typing{display:flex;gap:4px;padding:8px 0}
.typing span{width:8px;height:8px;background:var(--chat-muted);border-radius:50%;animation:typingDot 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-8px);opacity:1}}

/* Follow-up Suggestions */
.follow-up{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.follow-up-btn{padding:8px 14px;border-radius:20px;background:transparent;border:1px solid var(--chat-border);color:var(--chat-muted);font-size:12px;cursor:pointer;transition:all .15s;font-family:inherit}
.follow-up-btn:hover{border-color:var(--chat-gold);color:var(--chat-gold);background:rgba(212,168,67,.06)}

/* Input Area */
.input-area{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--chat-bg) 20%);padding:12px 20px 20px;z-index:10}
.input-wrap{max-width:800px;margin:0 auto}
.input-box{display:flex;align-items:flex-end;gap:8px;background:var(--chat-surface);border:1px solid var(--chat-border);border-radius:14px;padding:8px 12px;transition:border-color .2s}
.input-box:focus-within{border-color:var(--chat-gold)}
.input-box textarea{flex:1;background:transparent;border:none;color:var(--chat-text);font-size:14px;font-family:inherit;padding:8px 4px;resize:none;outline:none;direction:rtl;max-height:150px;line-height:1.6}
.input-box textarea::placeholder{color:var(--chat-muted)}
.send-btn{width:38px;height:38px;border-radius:10px;background:var(--chat-gold);border:none;color:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:#f5c563;transform:scale(1.05)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:18px;height:18px}
.input-hint{text-align:center;margin-top:8px;font-size:11px;color:var(--chat-muted)}

/* Scroll to bottom */
.scroll-bottom{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);width:36px;height:36px;border-radius:50%;background:var(--chat-surface);border:1px solid var(--chat-border);color:var(--chat-muted);display:none;align-items:center;justify-content:center;cursor:pointer;z-index:20;font-size:16px}
.scroll-bottom.show{display:flex}

/* Mobile sidebar */
.sidebar-toggle{display:none;position:fixed;top:12px;left:12px;z-index:30;width:36px;height:36px;border-radius:8px;background:var(--chat-surface);border:1px solid var(--chat-border);color:var(--chat-text);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:18px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15}

@media(max-width:768px){
  .sidebar{position:fixed;top:0;bottom:0;left:0;z-index:20;transform:translateX(-100%);transition:transform .3s ease}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .sidebar-toggle{display:flex}
  .topbar{padding:12px 16px 12px 56px}
  .chat-scroll{padding:16px 16px 100px}
  .msg-content{max-width:92%}
  .welcome h1{font-size:1.4rem}
  .quick-grid{grid-template-columns:1fr}
  .input-area{padding:8px 12px 14px}
}
@media(max-width:480px){
  .msg-bubble{padding:12px 14px;font-size:13px}
  .welcome{padding:40px 16px 24px}
}
</style>
</head>
<body>

<!-- Sidebar Toggle (Mobile) -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" onclick="newChat()">
        <span>+</span> محادثة جديدة
      </button>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">
      <a href="index.html">🏠 الرئيسية</a>
      <a href="laws.html">⚖️ تصفح القوانين</a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Top Bar -->
    <div class="topbar">
      <div class="topbar-title">
        <span class="dot"></span>
        المستشار اليمني القانوني
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="clearCurrentChat()">🗑️ مسح</button>
      <a href="admin.html" class="topbar-btn">⚙️ الإدارة</a>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="chat-scroll" id="chatScroll">
        <!-- Welcome -->
        <div class="welcome" id="welcome">
          <div class="welcome-icon">⚖️</div>
          <h1>المستشار اليمني القانوني</h1>
          <p>مساعد قانوني ذكي متخصص في القوانين والتشريعات اليمنية. اسألني أي سؤال قانوني وسأجيبك بناءً على القوانين اليمنية الحقيقية.</p>
          <div class="quick-grid">
            <button class="quick-btn" onclick="askQuick(this)">هل يحق للمؤجر طرد المستأجر قبل انتهاء عقد الإيجار؟</button>
            <button class="quick-btn" onclick="askQuick(this)">ما عقوبة السرقة في القانون اليمني؟</button>
            <button class="quick-btn" onclick="askQuick(this)">كيف أرفع دعوى مدنية في اليمن؟</button>
            <button class="quick-btn" onclick="askQuick(this)">ما حكم الشيك بدون رصيد؟</button>
            <button class="quick-btn" onclick="askQuick(this)">كيف يتم تقسيم الميراث في اليمن؟</button>
            <button class="quick-btn" onclick="askQuick(this)">ما حقوق العامل عند الفصل التعسفي؟</button>
          </div>
        </div>
        <!-- Messages appended here -->
      </div>
    </div>

    <!-- Scroll to bottom -->
    <button class="scroll-bottom" id="scrollBtn" onclick="scrollToBottom()">↓</button>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrap">
        <div class="input-box">
          <textarea id="userInput" placeholder="اسأل سؤالك القانوني هنا..." rows="1"></textarea>
          <button class="send-btn" id="sendBtn" onclick="send()" aria-label="إرسال">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <div class="input-hint">يبحث في 12,868+ مادة قانونية يمنية • Shift+Enter لسطر جديد</div>
      </div>
    </div>
  </div>
</div>

<script src="search-engine.js"></script>
<script src="legal-rag-v3.js"></script>
<script src="knowledge-manager.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="admin-engine.js"></script>
<script src="legal-response.js"></script>
<script>
/* ===== State ===== */
var ragIndex = null;
var chats = JSON.parse(localStorage.getItem('advisor_chats') || '[]');
var currentChatId = null;
var isStreaming = false;
var supabaseReady = false;

/* ===== Init ===== */
async function init(){
  try {
    // Try Supabase first
    var backendOk = await Backend.initialize();
    if(backendOk && Backend.isConfigured()){
      supabaseReady = true;
      console.log('✅ Supabase connected — loading from cloud');
      await loadFromSupabase();
    } else {
      console.log('⚠️ Supabase not available — using local JSON');
      var db = await App.loadDatabase();
      ragIndex = LegalRAGv3.buildIndex(db);
    }
    renderChatList();
    if(chats.length) loadChat(chats[0].id);
  } catch(e){
    console.error('Init error:', e);
    // Fallback to local
    var db = await App.loadDatabase();
    ragIndex = LegalRAGv3.buildIndex(db);
  }
}

async function loadFromSupabase(){
  console.log('Loading laws from Supabase...');
  var laws = await Backend.getLaws();
  console.log('Loaded ' + laws.length + ' laws');
  
  // Load ALL articles in one query (not per-law)
  console.log('Loading all articles...');
  var allArticles = await Backend.dbSelect('law_articles', null, {limit: 20000});
  console.log('Loaded ' + allArticles.length + ' articles');
  
  // Group articles by law_slug
  var articlesByLaw = {};
  allArticles.forEach(function(a){
    if(!articlesByLaw[a.law_slug]) articlesByLaw[a.law_slug] = [];
    articlesByLaw[a.law_slug].push({number: a.article_number, text: a.article_text});
  });
  
  // Build database object for RAG
  var db = { laws: {}, contracts: [], posts: [] };
  laws.forEach(function(l){
    if(!db.laws[l.section]) db.laws[l.section] = [];
    db.laws[l.section].push({
      title: l.title,
      description: l.description || '',
      slug: l.slug,
      section: l.section,
      sectionLabel: l.section_label || l.section,
      url: 'viewer.html?type=law&section='+encodeURIComponent(l.section)+'&slug='+encodeURIComponent(l.slug),
      articles: articlesByLaw[l.slug] || []
    });
  });
  
  ragIndex = LegalRAGv3.buildIndex(db);
  console.log('✅ RAG index built from Supabase: ' + ragIndex.N + ' docs');
}

/* ===== Chat Management ===== */
function newChat(){
  var id = Date.now().toString(36);
  var chat = { id: id, title: 'محادثة جديدة', messages: [], created: Date.now() };
  chats.unshift(chat);
  saveChats();
  loadChat(id);
  renderChatList();
}

function loadChat(id){
  currentChatId = id;
  var chat = chats.find(function(c){ return c.id === id; });
  if(!chat){ newChat(); return; }
  var scroll = document.getElementById('chatScroll');
  scroll.innerHTML = '';
  document.getElementById('welcome').style.display = chat.messages.length ? 'none' : 'block';
  if(!chat.messages.length) scroll.appendChild(document.getElementById('welcome'));
  for(var i = 0; i < chat.messages.length; i++){
    appendMessageDOM(chat.messages[i].role, chat.messages[i].content, chat.messages[i].md, false);
  }
  renderChatList();
  scrollToBottom();
}

function deleteChat(id, e){
  e.stopPropagation();
  chats = chats.filter(function(c){ return c.id !== id; });
  saveChats();
  if(currentChatId === id){
    if(chats.length) loadChat(chats[0].id);
    else newChat();
  }
  renderChatList();
}

function clearCurrentChat(){
  var chat = chats.find(function(c){ return c.id === currentChatId; });
  if(chat){ chat.messages = []; chat.title = 'محادثة جديدة'; saveChats(); loadChat(currentChatId); }
}

function saveChats(){
  try{ localStorage.setItem('advisor_chats', JSON.stringify(chats.slice(0, 50))); } catch(e){}
}

function renderChatList(){
  var el = document.getElementById('chatList');
  var html = '';
  for(var i = 0; i < chats.length; i++){
    var c = chats[i];
    html += '<div class="chat-item'+(c.id===currentChatId?' active':'')+'" onclick="loadChat(\''+c.id+'\')">';
    html += '<span class="chat-item-icon">💬</span>';
    html += '<span class="chat-item-title">'+esc(c.title)+'</span>';
    html += '<span class="chat-item-delete" onclick="deleteChat(\''+c.id+'\',event)">✕</span>';
    html += '</div>';
  }
  el.innerHTML = html;
}

/* ===== Send Message ===== */
function send(){
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if(!text || isStreaming) return;

  document.getElementById('welcome').style.display = 'none';

  /* Save user message */
  var chat = chats.find(function(c){ return c.id === currentChatId; });
  if(!chat){ newChat(); chat = chats.find(function(c){ return c.id === currentChatId; }); }
  chat.messages.push({ role: 'user', content: text });
  if(chat.messages.length === 1) chat.title = text.slice(0, 40);
  saveChats();
  renderChatList();

  /* Display user message */
  appendMessageDOM('user', text, false, false);
  input.value = '';
  input.style.height = 'auto';

  /* Show typing */
  var typingId = showTyping();
  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  /* Process */
  setTimeout(function(){
    processAndRespond(text, typingId, chat);
  }, 200);
}

async function processAndRespond(query, typingId, chat){
  var intent = LegalRAGv3.detectIntent(query);
  var results = LegalRAGv3.search(ragIndex, query, 12, intent);

  /* Search Supabase knowledge base if available */
  if(supabaseReady){
    try {
      var kbResults = await Backend.searchKnowledge(query);
      if(kbResults.length && (!results.length || results[0].score < 30)){
        for(var k = 0; k < kbResults.length; k++){
          var kr = kbResults[k];
          results.unshift({
            doc: {
              type: 'knowledge',
              title: (kr.article_number ? 'مادة (' + kr.article_number + ') — ' : '') + (kr.law_title || ''),
              text: kr.article_text || '',
              section: kr.section || '',
              url: '',
              lawTitle: kr.law_title || '',
              articleNumber: kr.article_number || ''
            },
            score: 100 * (kr.confidence || 0.5)
          });
        }
      }
      Backend.trackAdvisorQuery(query, intent, results.length > 0 ? results[0].score : 0, results.length > 0);
      if(!results.length) Backend.trackNoResult(query);
    } catch(e){}
  } else {
    /* Fallback to local knowledge */
    try {
      var knowledgeResults = await KnowledgeManager.searchKnowledge(query, 3);
      if(knowledgeResults.length && (!results.length || results[0].score < 30)){
        for(var k = 0; k < knowledgeResults.length; k++){
          var kr = knowledgeResults[k];
          results.unshift({
            doc: { type:'knowledge', title:(kr.articleNumber?'مادة ('+kr.articleNumber+') — ':'')+(kr.lawTitle||''), text:kr.articleText||'', section:kr.section||'', url:'', lawTitle:kr.lawTitle||'', articleNumber:kr.articleNumber||'' },
            score: 100 * (kr.confidence || 0.5)
          });
        }
      }
    } catch(e){}
  }

  var responseParts = LegalResponse.generate(query, results, intent);
  var markdown = LegalResponse.toMarkdown(responseParts);

  /* If low confidence, suggest knowledge submission */
  var hasHighConfidence = results.length && results[0].score > 30;
  if(!hasHighConfidence){
    markdown += '\n\n---\n\n';
    markdown += '> 📝 **لم أجد نصاً قانونياً كافياً.** يمكنك إضافة المعرفة من [لوحة الإدارة](admin.html).\n';
    if(supabaseReady){
      try { await Backend.addKnowledge({query:query, topic:intent, source:'سؤال مستخدم'}, 'system'); } catch(e){}
    } else {
      try { await KnowledgeManager.addKnowledge({query:query, topic:intent, source:'سؤال مستخدم'}); } catch(e){}
    }
  }
    } catch(e){}
  }

  /* Remove typing indicator */
  var typingEl = document.getElementById(typingId);
  if(typingEl) typingEl.remove();

  /* Stream the response */
  streamResponse(markdown, chat);
}

/* ===== Streaming ===== */
function streamResponse(fullText, chat){
  var msgEl = appendMessageDOM('ai', '', true, true);
  var bubble = msgEl.querySelector('.msg-bubble');
  var cursor = document.createElement('span');
  cursor.className = 'streaming-cursor';
  bubble.appendChild(cursor);

  var words = fullText.split(/(\s+)/);
  var idx = 0;
  var current = '';

  function streamNext(){
    if(idx >= words.length){
      /* Done streaming */
      cursor.remove();
      bubble.innerHTML = renderMarkdown(fullText);
      isStreaming = false;
      document.getElementById('sendBtn').disabled = false;

      /* Add follow-up suggestions */
      var conv = LegalResponse.getConversation();
      var lastParts = chat.messages.length > 0 ? null : null;
      var suggestions = extractSuggestions(fullText);
      if(suggestions.length){
        var followDiv = document.createElement('div');
        followDiv.className = 'follow-up';
        for(var s = 0; s < suggestions.length; s++){
          var btn = document.createElement('button');
          btn.className = 'follow-up-btn';
          btn.textContent = suggestions[s];
          btn.onclick = (function(q){ return function(){ document.getElementById('userInput').value = q; send(); }; })(suggestions[s]);
          followDiv.appendChild(btn);
        }
        msgEl.querySelector('.msg-content').appendChild(followDiv);
      }

      /* Save to chat */
      chat.messages.push({ role: 'assistant', content: fullText, md: true });
      saveChats();
      scrollToBottom();
      return;
    }

    /* Add a few words at a time for smooth streaming */
    var batch = Math.min(3, words.length - idx);
    for(var b = 0; b < batch; b++){
      current += words[idx];
      idx++;
    }

    /* Render with cursor */
    bubble.innerHTML = renderMarkdown(current) + '<span class="streaming-cursor"></span>';
    scrollToBottom();

    var delay = 20 + Math.random() * 30;
    setTimeout(streamNext, delay);
  }

  streamNext();
}

/* ===== Extract Follow-up Suggestions ===== */
function extractSuggestions(text){
  var match = text.match(/### 💡 أسئلة مقترحة\n\n((?:- .+\n?)+)/);
  if(!match) return [];
  var lines = match[1].split('\n').filter(function(l){ return l.trim().startsWith('- '); });
  return lines.map(function(l){ return l.replace(/^-\s*/, '').trim(); }).filter(Boolean);
}

/* ===== Append Message DOM ===== */
function appendMessageDOM(role, content, isMd, animate){
  var chatScroll = document.getElementById('chatScroll');
  var msg = document.createElement('div');
  msg.className = 'msg ' + role;
  if(animate) msg.style.animation = 'fadeIn .3s ease';

  var avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? '⚖️' : '👤';

  var msgContent = document.createElement('div');
  msgContent.className = 'msg-content';

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if(isMd && content){
    bubble.innerHTML = renderMarkdown(content);
  } else if(content){
    bubble.textContent = content;
  }

  /* Actions */
  var actions = document.createElement('div');
  actions.className = 'msg-actions';
  var copyBtn = document.createElement('button');
  copyBtn.className = 'msg-action';
  copyBtn.textContent = '📋 نسخ';
  copyBtn.onclick = function(){ copyText(bubble); };
  actions.appendChild(copyBtn);

  msgContent.appendChild(bubble);
  msgContent.appendChild(actions);
  msg.appendChild(avatar);
  msg.appendChild(msgContent);
  chatScroll.appendChild(msg);
  scrollToBottom();
  return msg;
}

/* ===== Typing Indicator ===== */
function showTyping(){
  var id = 'typing-' + Date.now();
  var chatScroll = document.getElementById('chatScroll');
  var msg = document.createElement('div');
  msg.className = 'msg ai';
  msg.id = id;
  msg.innerHTML = '<div class="msg-avatar">⚖️</div><div class="msg-content"><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>';
  chatScroll.appendChild(msg);
  scrollToBottom();
  return id;
}

/* ===== Markdown Renderer (simple) ===== */
function renderMarkdown(text){
  if(!text) return '';
  var html = esc(text);

  /* Code blocks */
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  /* Inline code */
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  /* Headers */
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  /* Bold */
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  /* Italic */
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  /* Blockquote */
  html = html.replace(/^&gt;\s?(.+)$/gm, '<blockquote>$1</blockquote>');
  /* Merge consecutive blockquotes */
  html = html.replace(/<\/blockquote>\n<blockquote>/g, '<br>');
  /* HR */
  html = html.replace(/^---$/gm, '<hr>');
  /* Links */
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  /* Lists */
  html = html.replace(/^(\d+)\.\s+(.+)$/gm, '<li>$2</li>');
  html = html.replace(/^[-•]\s+(.+)$/gm, '<li>$1</li>');
  /* Wrap consecutive li in ul */
  html = html.replace(/(<li>[\s\S]*?<\/li>)/g, function(match){
    if(match.indexOf('<li>') === 0) return '<ul>' + match + '</ul>';
    return match;
  });
  /* Clean up nested ul */
  html = html.replace(/<\/ul>\s*<ul>/g, '');
  /* Tables */
  html = html.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g, function(match, header, body){
    var ths = header.split('|').filter(Boolean).map(function(h){ return '<th>'+h.trim()+'</th>'; }).join('');
    var rows = body.trim().split('\n').map(function(row){
      var tds = row.split('|').filter(Boolean).map(function(d){ return '<td>'+d.trim()+'</td>'; }).join('');
      return '<tr>'+tds+'</tr>';
    }).join('');
    return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+rows+'</tbody></table>';
  });
  /* Paragraphs */
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*<(h[123]|ul|ol|table|blockquote|pre|hr)/g, '<$1');
  html = html.replace(/<\/(h[123]|ul|ol|table|blockquote|pre|hr)>\s*<\/p>/g, '</$1>');
  html = html.replace(/<p>\s*<\/p>/g, '');

  return html;
}

/* ===== Quick Questions ===== */
function askQuick(el){
  var text = el.textContent.trim();
  document.getElementById('userInput').value = text;
  send();
}

/* ===== Copy Text ===== */
function copyText(el){
  var text = el.innerText || el.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(function(){ showToast('تم النسخ'); });
  }
}

function showToast(msg){
  var toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:8px 20px;border-radius:8px;font-size:13px;z-index:100;animation:fadeIn .3s';
  document.body.appendChild(toast);
  setTimeout(function(){ toast.remove(); }, 2000);
}

/* ===== Helpers ===== */
function esc(s){ return String(s||'').replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c]; }); }

function scrollToBottom(){
  var area = document.getElementById('chatArea');
  setTimeout(function(){ area.scrollTop = area.scrollHeight; }, 50);
}

/* Scroll visibility */
document.getElementById('chatArea').addEventListener('scroll', function(){
  var el = this;
  var btn = document.getElementById('scrollBtn');
  btn.classList.toggle('show', el.scrollHeight - el.scrollTop - el.clientHeight > 200);
}, {passive: true});

/* Sidebar toggle */
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

/* Auto-resize textarea */
var userInput = document.getElementById('userInput');
userInput.addEventListener('input', function(){
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});
userInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});

/* ===== Start ===== */
init();
